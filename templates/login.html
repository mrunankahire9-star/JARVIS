<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body{
            background:black;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#111;
            padding:40px;
            border-radius:15px;
            width:300px;
            animation: fade 1s ease;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:20px;
            background:cyan;
            border:none;
            cursor:pointer;
        }

        @keyframes fade{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>

<body>

<div class="box">
    <h1>JARVIS Login</h1>

    <form method="POST">
        <input type="text" placeholder="Username" name="username">
        <input type="password" placeholder="Password" name="password">

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
